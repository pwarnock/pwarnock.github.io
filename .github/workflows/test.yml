name: Test Hugo build

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '*.md'

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - 'packages/site/**'
              - 'packages/tooling/**'
              - 'packages/qa-tools/**'
              - 'packages/agents/**'
              - 'layouts/**'
              - 'content/**'
              - 'assets/**'
              - 'data/**'
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile --no-progress

      - name: Run placeholder detection
        run: ./scripts/placeholder-detection.sh

      - name: Test Hugo build
        run: hugo --minify --gc

      - name: Check for broken internal links
        run: |
          # Check if all internal links resolve to existing files
          find packages/site/public -name "*.html" -exec grep -H "href=\"/" {} \; | \
          while read line; do
            url=$(echo "$line" | sed -n 's/.*href="\/\([^"]*\)".*/\1/p')
            if [ -n "$url" ]; then
              if [ ! -f "packages/site/public/$url" ] && [ ! -f "packages/site/public/$url/index.html" ]; then
                echo "Broken link found: /$url"
                exit 1
              fi
            fi
          done
          echo "All internal links are valid"
  e2e-tests:
    name: 'E2E Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4
      - name: 'Setup Hugo'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: 'Setup Bun'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lock
      - name: 'Install Dependencies'
        run: bun install --frozen-lockfile --no-progress
      - name: 'Cache Playwright Browsers'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: 'Install Playwright Browsers'
        run: bunx playwright install --with-deps
      - name: 'Run Playwright Tests'
        run: bunx playwright test --grep-invert @visual
      - name: 'Run Placeholder Detection Tests'
        run: bunx playwright test placeholder-detection.spec.ts
      - name: 'Upload Playwright Report'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
