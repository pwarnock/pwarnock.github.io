name: Test Hugo build

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '*.md'

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true
          cache-dependency-path: bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile --no-progress

      - name: Run placeholder detection
        run: ./scripts/placeholder-detection.sh

      - name: Test Hugo build
        run: hugo --minify --gc

      - name: Check for broken internal links
        run: |
          # Check if all internal links resolve to existing files
          find packages/site/public -name "*.html" -exec grep -H "href=\"/" {} \; | \
          while read line; do
            url=$(echo "$line" | sed -n 's/.*href="\/\([^"]*\)".*/\1/p')
            if [ -n "$url" ]; then
              if [ ! -f "packages/site/public/$url" ] && [ ! -f "packages/site/public/$url/index.html" ]; then
                echo "Broken link found: /$url"
                exit 1
              fi
            fi
          done
          echo "All internal links are valid"
